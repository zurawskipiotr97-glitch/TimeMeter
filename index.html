<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Relfeksomierzacz</title>

        <link rel="icon" href="./favicon.ico" sizes="any">
        <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
        <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
        <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
        <link rel="manifest" href="./site.webmanifest">

        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <main>

    
        <header>
            <img src="android-chrome-512x512.png" id="logo" alt="Ikona strony">
            <h1>Relfeksomierzacz</h1>
        </header>
        <body>

            <div id="settings" style="display: true;">
                <p>
                    <label for="tryLimit">Limit prób:</label>
                    <input type="number" id="tryLimit" value="5">
                </p>
                <button id="startButton" type="button" onclick="StartGame()">Start</button>
            </div>

            <div id="game" style="display: true;">
                <p id="message">Good Luck!</p>
                <p id="tries">Pozostałe próby: ????</p> 

                <div class="square" id="square1"></div>



            
            <button id="stopButton" type="button" onclick="StopGame()">Stop</button>
            </div>

        </body>
        <footer>
            
        </footer>
    </main>
</html>
